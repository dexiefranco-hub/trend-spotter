<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Spotter — Weekly Signal Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F6F9; --card:#FFFFFF; --ink:#141A26; --muted:#5B6472;
    --amazon:#E8890C; --google:#2563EB; --tiktok:#E5266A; --win:#0E9F6E;
    --line:#E3E7EE; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.45;padding:20px 16px 60px}
  .wrap{max-width:1000px;margin:0 auto}

  header{margin-bottom:16px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .navbtn{background:var(--ink);color:#fff;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:99px;text-decoration:none;white-space:nowrap}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(26px,5vw,36px);letter-spacing:-.02em;margin-top:4px}
  .updated{color:var(--muted);font-size:14px;margin-top:4px;font-weight:500}

  .summary{background:var(--ink);color:#F2F5FA;border-radius:var(--radius);padding:16px 18px;font-size:14.5px;margin:16px 0 28px}
  .summary b{color:#FFD37A}

  h2.section{font-family:'Space Grotesk',sans-serif;font-size:15px;letter-spacing:.06em;text-transform:uppercase;margin:0 0 4px}
  .section-sub{font-size:13px;color:var(--muted);margin-bottom:12px}

  /* Strongest = cross-platform winners only */
  .board{display:grid;gap:10px;margin-bottom:34px}
  .win-card{background:var(--card);border:1.5px solid var(--win);border-radius:var(--radius);padding:14px 16px;display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center}
  .rank{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:var(--win);text-align:center}
  .w-name{font-weight:700;font-size:16px;color:var(--ink);text-decoration:none;display:block}
  .w-name:hover{text-decoration:underline}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
  .chip{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:99px;color:#fff}
  .chip.amazon{background:var(--amazon)} .chip.google_trends{background:var(--google)} .chip.tiktok{background:var(--tiktok)}
  .w-metric{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--win);text-align:right;max-width:150px}
  .w-metric small{display:block;font-family:'Inter';font-weight:500;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .none{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:18px;color:var(--muted);font-size:14px}

  /* Compact source panels: name + number only */
  .panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .panel-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .panel-head h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .r-name{font-weight:600;font-size:13.5px;color:var(--ink);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .r-name:hover{text-decoration:underline}
  .r-metric{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12.5px;white-space:nowrap;flex-shrink:0;text-align:right}

  .empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:40px 20px;text-align:center;color:var(--muted)}
  .empty b{color:var(--ink)}
  footer{margin-top:34px;color:var(--muted);font-size:12.5px;text-align:center}
  @media(max-width:640px){
    body{padding:14px 10px 50px}
    .w-metric{max-width:110px;font-size:14px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <div class="eyebrow">Agent 1 · Products · Mondays 6 AM</div>
      <a class="navbtn" href="trends.html">Agent 2: Social Radar →</a>
    </div>
    <h1>Trend Spotter</h1>
    <div class="updated" id="updated">Loading latest run…</div>
  </header>

  <div id="content"></div>

  <footer>🏆 = confirmed selling on Amazon AND TikTok · tap any product to view it live</footer>
</div>

<script>
const COLORS = {amazon:'var(--amazon)', google_trends:'var(--google)', tiktok:'var(--tiktok)'};
const LABELS = {amazon:'Amazon', google_trends:'Google', tiktok:'TikTok'};

function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
function norm(s){return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();}

function linkFor(name, panel){
  const q = encodeURIComponent(name);
  if(panel === 'amazon') return `https://www.amazon.com/s?k=${q}`;
  if(panel === 'tiktok') return `https://www.google.com/search?q=${q}+TikTok+Shop`;
  return `https://www.google.com/search?q=${q}`;
}

async function load(){
  const box = document.getElementById('content');
  try{
    const res = await fetch('data.json?v=' + Date.now());
    if(!res.ok) throw new Error('no data yet');
    const d = await res.json();

    document.getElementById('updated').textContent = d.week_range
      ? 'Week of ' + d.week_range : 'Last run: ' + (d.updated_display || '');

    let html = '';
    if(d.summary) html += `<div class="summary"><b>This week:</b> ${esc(d.summary)}</div>`;

    // ---- STRONGEST: only items on BOTH Amazon and TikTok ----
    const winners = (d.aligned||[]).filter(a=>{
      const src = (a.sources||[]).map(s=>s.toLowerCase());
      return src.includes('amazon') && src.includes('tiktok');
    });

    html += `<h2 class="section">🏆 Strongest This Week</h2>
    <div class="section-sub">Selling on BOTH Amazon and TikTok Shop — demand confirmed on two platforms</div>
    <div class="board">`;
    if(winners.length){
      winners.forEach((a,i)=>{
        const chips = (a.sources||[]).map(s=>`<span class="chip ${s}">${LABELS[s]||s}</span>`).join('');
        html += `<div class="win-card">
          <div class="rank">${i+1}</div>
          <div style="min-width:0">
            <a class="w-name" href="${linkFor(a.name,'amazon')}" target="_blank" rel="noopener">${esc(a.name)} ↗</a>
            <div class="chips">${chips}</div>
          </div>
          <div class="w-metric">${esc(a.metric||'')}<small>${a.metric?'reported':'cross-platform'}</small></div>
        </div>`;
      });
    } else {
      html += `<div class="none">No products confirmed on both Amazon and TikTok this week — check the source panels below for single-platform risers.</div>`;
    }
    html += `</div>`;

    // ---- Compact source panels: name + number ----
    html += `<h2 class="section">By Source</h2><div class="section-sub">Ranked by momentum · numbers are real reported figures</div><div class="panels">`;
    for(const key of ['amazon','google_trends','tiktok']){
      const items = (d[key]||[]).slice().sort((a,b)=>(b.momentum||0)-(a.momentum||0));
      html += `<div class="panel">
        <div class="panel-head"><span class="dot" style="background:${COLORS[key]}"></span><h3>${key==='amazon'?'Amazon':key==='google_trends'?'Google Trends':'TikTok'}</h3></div>
        ${items.map(it=>`<div class="row">
          <a class="r-name" href="${linkFor(it.name,key)}" target="_blank" rel="noopener">${esc(it.name)}</a>
          <span class="r-metric" style="color:${COLORS[key]}">${esc(it.metric||it.momentum)}</span>
        </div>`).join('')}
      </div>`;
    }
    html += `</div>`;

    box.innerHTML = html;
  }catch(e){
    document.getElementById('updated').textContent = '';
    box.innerHTML = `<div class="empty"><b>No data yet.</b><br><br>Go to Actions → <b>Weekly Trend Spotter</b> → <b>Run workflow</b>, then refresh here.</div>`;
  }
}
load();
</script>
</body>
</html>
