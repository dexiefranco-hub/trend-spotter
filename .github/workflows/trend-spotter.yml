name: Weekly Trend Spotter

on:
  schedule:
    # Runs Monday 11:00 UTC = 6:00 AM Houston (CDT).
    - cron: '0 11 * * 1'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write   # allows the workflow to save results back to the repo

concurrency:
  group: trend-spotter
  cancel-in-progress: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Get the repo files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the Anthropic library
        run: pip install anthropic

      - name: Run the Trend Spotter agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent.py

      - name: Save the new results to the dashboard
        run: |
          git config user.name "trend-spotter-bot"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Weekly trend update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
